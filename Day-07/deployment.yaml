apiVersion: apps/v1

kind: Deployment

metadata:
  name: sample-python-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: python

  template:
    metadata:
      labels:
        app: python

    spec:
      containers:
      - name: python-container
        image: nginx

        volumeMounts:
        - name: secret-volume
          mountPath: /etc/secret-data

      volumes:
      - name: secret-volume
        secret:
          secretName: test-secret